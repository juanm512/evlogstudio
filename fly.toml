# fly.toml app configuration file generated for evlogstudio on 2026-04-20T13:55:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'evlogstudio'
primary_region = 'gru'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
